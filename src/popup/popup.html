<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    /* ── Mechanical / gunmetal control panel theme ───────────────
       Brushed-steel surfaces, beveled panel edges, knurled machined
       controls, engraved monospace labels, amber indicator accent. */
    :root {
      --steel-0: #16181c;   /* deep shadow / groove */
      --steel-1: #1d2024;   /* recessed */
      --steel-2: #23262b;   /* base surface */
      --steel-3: #2c3037;   /* raised surface */
      --edge-hi: #40464f;   /* top bevel highlight */
      --edge-lo: #101215;   /* bottom bevel shadow */
      --txt:     #c6ccd4;   /* engraved steel text */
      --txt-dim: #868d97;
      --amber:   #f0a830;   /* indicator / active */
      --amber-d: #b97c17;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: 'Consolas', 'SFMono-Regular', ui-monospace, 'JetBrains Mono', monospace;
      color: var(--txt);
      padding: 14px;
      background-color: #202327;
      /* brushed-metal grain */
      background-image:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.014) 0 1px, transparent 1px 3px),
        linear-gradient(180deg, #24272c, #1b1e22);
    }

    /* Nameplate header */
    h1 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #e8ecf1;
      margin-bottom: 16px;
      padding: 9px 11px;
      display: flex;
      align-items: center;
      gap: 9px;
      background: linear-gradient(180deg, var(--steel-3), var(--steel-2));
      border: 1px solid var(--edge-lo);
      border-top-color: var(--edge-hi);
      border-radius: 3px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 1px 2px rgba(0,0,0,0.55);
    }

    /* status LED (not an icon font — pure CSS) */
    h1 .led {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #ffd27a, var(--amber) 60%, var(--amber-d));
      box-shadow: 0 0 5px rgba(240,168,48,0.8), inset 0 0 1px rgba(0,0,0,0.4);
      flex: none;
    }

    /* Toggle row */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 7px 2px;
      border-bottom: 1px solid var(--steel-0);
      box-shadow: 0 1px 0 rgba(255,255,255,0.03);
    }

    .toggle-row label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--txt);
    }

    /* Mechanical rocker switch */
    .switch {
      position: relative;
      width: 44px;
      height: 22px;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, var(--steel-0), var(--steel-1));
      border: 1px solid var(--edge-lo);
      border-radius: 3px;
      cursor: pointer;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.65);
      transition: background 0.2s, border-color 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 1px;
      top: 1px;
      background:
        repeating-linear-gradient(90deg, rgba(0,0,0,0.28) 0 1px, transparent 1px 3px),
        linear-gradient(180deg, #4c525c, #2b3037);
      border: 1px solid var(--edge-lo);
      border-radius: 2px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.16), 0 1px 2px rgba(0,0,0,0.55);
      transition: transform 0.2s;
    }

    .switch input:checked + .slider {
      background: linear-gradient(180deg, #6d4a12, #8a5f14);
      border-color: var(--amber-d);
    }

    .switch input:checked + .slider::before {
      transform: translateX(22px);
      background:
        repeating-linear-gradient(90deg, rgba(0,0,0,0.22) 0 1px, transparent 1px 3px),
        linear-gradient(180deg, #ffc25a, #dd9421);
    }

    /* Upload bay */
    .upload-area {
      border: 1px solid var(--edge-lo);
      border-top-color: var(--edge-hi);
      border-radius: 3px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      background: linear-gradient(180deg, var(--steel-2), var(--steel-1));
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.45);
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 14px;
    }

    .upload-area:hover {
      border-color: var(--amber-d);
    }

    .upload-area.has-image {
      padding: 0;
      overflow: hidden;
    }

    .upload-area img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      display: block;
    }

    .upload-area .placeholder {
      color: var(--txt-dim);
      font-size: 11px;
      line-height: 1.6;
      letter-spacing: 0.3px;
    }

    .upload-area .placeholder strong {
      display: block;
      color: var(--txt);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .upload-area.drag-over {
      border-color: var(--amber);
      box-shadow: inset 0 0 12px rgba(240,168,48,0.15);
    }

    /* Machined key buttons (pet / quality / fonts) */
    .font-options {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .font-btn {
      flex: none;
      padding: 5px 9px;
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--txt-dim);
      background: linear-gradient(180deg, var(--steel-3), var(--steel-2));
      border: 1px solid var(--edge-lo);
      border-top-color: var(--edge-hi);
      border-radius: 2px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.4);
      transition: color 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .font-btn:hover { color: #e8ecf1; }
    .font-btn:active { transform: translateY(1px); }

    .font-btn.selected {
      color: var(--amber);
      border-color: var(--amber-d);
      background: linear-gradient(180deg, #33291a, #2a2317);
      box-shadow: inset 0 0 0 1px rgba(240,168,48,0.25), 0 0 6px rgba(240,168,48,0.12);
    }

    /* Gauges / sliders */
    .control-group {
      margin-bottom: 12px;
    }

    .control-group label {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--txt-dim);
      margin-bottom: 6px;
    }

    .control-group label span {
      color: var(--amber);
      font-weight: 700;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: linear-gradient(180deg, var(--steel-0), var(--steel-1));
      border: 1px solid var(--edge-lo);
      border-radius: 2px;
      outline: none;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.7);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 13px;
      height: 18px;
      border-radius: 2px;
      background:
        repeating-linear-gradient(90deg, rgba(0,0,0,0.25) 0 1px, transparent 1px 2px),
        linear-gradient(180deg, #4c525c, #2b3037);
      border: 1px solid var(--edge-lo);
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 1px 2px rgba(0,0,0,0.6);
    }

    /* Command keys */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      flex: 1;
      padding: 9px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,0.5);
      transition: filter 0.15s, transform 0.05s;
    }

    button:hover { filter: brightness(1.1); }
    button:active { transform: translateY(1px); }

    .btn-primary {
      background: linear-gradient(180deg, #e6a02f, #c07d18);
      color: #1c1200;
      border: 1px solid #8a5810;
      text-shadow: 0 1px 0 rgba(255,255,255,0.25);
    }

    .btn-secondary {
      background: linear-gradient(180deg, var(--steel-3), var(--steel-2));
      color: var(--txt);
      border: 1px solid var(--edge-lo);
      border-top-color: var(--edge-hi);
    }

    /* Readout */
    .status {
      text-align: center;
      font-size: 10px;
      letter-spacing: 0.5px;
      color: var(--amber);
      margin-top: 8px;
      min-height: 16px;
      transition: opacity 0.3s;
    }

    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <h1><span class="led"></span> Gemini Wallpaper</h1>

  <!-- Enable toggle -->
  <div class="toggle-row">
    <label for="enableToggle">Enable Wallpaper</label>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <!-- Pet toggle -->
  <div class="toggle-row">
    <label for="petToggle">Pet</label>
    <label class="switch">
      <input type="checkbox" id="petToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <!-- Chatbox window (macOS-style traffic-light controls) -->
  <div class="toggle-row">
    <label for="dragToggle">Chatbox Window</label>
    <label class="switch">
      <input type="checkbox" id="dragToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <!-- Assistant (independent draggable orb launcher) -->
  <div class="toggle-row">
    <label for="ballToggle">Assistant</label>
    <label class="switch">
      <input type="checkbox" id="ballToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <!-- Chat notes (linked to highlighted text) -->
  <div class="toggle-row">
    <label for="notesToggle">Chat Notes</label>
    <label class="switch">
      <input type="checkbox" id="notesToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <!-- Thinking buddy (mascot while Gemini generates) -->
  <div class="toggle-row">
    <label for="thinkingToggle">Thinking Buddy</label>
    <label class="switch">
      <input type="checkbox" id="thinkingToggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <!-- Bulk delete (sidebar conversation checkboxes) -->
  <div class="toggle-row">
    <label for="bulkDeleteToggle">Bulk Delete (sidebar)</label>
    <label class="switch">
      <input type="checkbox" id="bulkDeleteToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <!-- Chatbox scale -->
  <div class="control-group">
    <label>
      Chatbox Scale
      <span id="chatboxScaleVal">100%</span>
    </label>
    <input type="range" id="chatboxScaleSlider" min="50" max="150" value="100" step="5" />
  </div>

  <!-- Pet type picker -->
  <div class="control-group">
    <label>Pet Type <span id="petTypeVal">Duck</span></label>
    <div class="font-options">
      <button class="font-btn selected" data-pet="duck">🦆 Duck</button>
      <button class="font-btn" data-pet="dog">🐶 Dog</button>
      <button class="font-btn" data-pet="fox">🦊 Fox</button>
    </div>
  </div>

  <!-- Image upload -->
  <div class="upload-area" id="uploadArea">
    <div class="placeholder" id="uploadPlaceholder">
      <strong>Click to choose an image</strong>
      or drag it here / Ctrl+V to paste
    </div>
    <img id="previewImg" style="display:none" />
  </div>
  <input type="file" id="fileInput" accept="image/*" />

  <!-- Image quality -->
  <div class="control-group">
    <label>Image Quality <span id="qualityVal">Medium</span></label>
    <div class="font-options">
      <button class="font-btn" data-quality="low">Low</button>
      <button class="font-btn selected" data-quality="medium">Medium</button>
      <button class="font-btn" data-quality="high">High</button>
      <button class="font-btn" data-quality="original">Original</button>
    </div>
  </div>

  <!-- Latin font picker -->
  <div class="control-group">
    <label>Latin Font <span id="fontVal">Default</span></label>
    <div class="font-options">
      <button class="font-btn selected" data-font="" data-group="latin">Default</button>
      <button class="font-btn" data-font="Inter" data-group="latin">Inter</button>
      <button class="font-btn" data-font="Merriweather" data-group="latin">Merriweather</button>
      <button class="font-btn" data-font="JetBrains Mono" data-group="latin">JB Mono</button>
      <button class="font-btn" data-font="Nunito" data-group="latin">Nunito</button>
    </div>
  </div>

  <!-- Chinese font picker -->
  <div class="control-group">
    <label>中文字體 <span id="cjkFontVal">預設</span></label>
    <div class="font-options">
      <button class="font-btn selected" data-font="" data-group="cjk">預設</button>
      <button class="font-btn" data-font="Noto Serif TC" data-group="cjk">思源宋</button>
      <button class="font-btn" data-font="Noto Sans TC" data-group="cjk">思源黑</button>
      <button class="font-btn" data-font="LXGW WenKai TC" data-group="cjk">文楷</button>
      <button class="font-btn" data-font="Zen Old Mincho" data-group="cjk">明朝</button>
      <button class="font-btn" data-font="Zen Maru Gothic" data-group="cjk">圓黑</button>
    </div>
  </div>

  <!-- Glass tint -->
  <div class="control-group">
    <label>
      Glass Tint
      <span style="display:flex;align-items:center;gap:6px;">
        <button class="font-btn" id="autoThemeBtn" type="button" title="Match tint to wallpaper colors">Auto</button>
        <input type="color" id="glassColor" value="#000000"
          style="width:22px;height:18px;border:none;border-radius:2px;cursor:pointer;padding:0;background:none;" />
        <span id="glassOpacityVal">45%</span>
      </span>
    </label>
    <input type="range" id="glassOpacity" min="0" max="100" value="45" />
  </div>

  <!-- Overlay opacity -->
  <div class="control-group">
    <label>
      Dim Overlay
      <span id="overlayVal">50%</span>
    </label>
    <input type="range" id="overlaySlider" min="0" max="100" value="50" />
  </div>

  <!-- Blur -->
  <div class="control-group">
    <label>
      Background Blur
      <span id="blurVal">0px</span>
    </label>
    <input type="range" id="blurSlider" min="0" max="20" value="0" />
  </div>

  <!-- Brightness -->
  <div class="control-group">
    <label>
      Brightness
      <span id="brightnessVal">100%</span>
    </label>
    <input type="range" id="brightnessSlider" min="20" max="150" value="100" />
  </div>

  <!-- Actions -->
  <div class="btn-row">
    <button class="btn-secondary" id="resetBtn">Reset</button>
    <button class="btn-primary" id="saveBtn">Apply</button>
  </div>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
